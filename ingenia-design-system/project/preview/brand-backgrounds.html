<!doctype html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body{padding:0;gap:0;background:var(--paper);overflow:hidden}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .tile{aspect-ratio:16/9;background-size:cover;background-position:center;position:relative;display:flex;align-items:flex-end;padding:12px}
  .cap{font-size:10px;color:#fff;text-transform:uppercase;letter-spacing:.12em;background:rgba(26,26,26,.6);padding:3px 8px;border-radius:2px;backdrop-filter:blur(4px)}
  .cap.dk{color:var(--ink);background:rgba(255,255,255,.75)}
</style></head><body>
  <div class="grid">
    <div class="tile" style="background-image:url(../assets/bg-gradient-01.jpg)"><span class="cap dk">Fondo 01 · Double blob</span></div>
    <div class="tile" style="background-image:url(../assets/bg-gradient-02.jpg)"><span class="cap dk">Fondo 02 · Loop ring</span></div>
    <div class="tile" style="background-image:url(../assets/bg-gradient-03.jpg)"><span class="cap dk">Fondo 03 · Trail</span></div>
    <div class="tile" style="background-image:url(../assets/bg-split-red.png)"><span class="cap dk">Fondo 04 · Poster split</span></div>
  </div>
</body></html>
