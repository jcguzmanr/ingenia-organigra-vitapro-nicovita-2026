<!doctype html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body{padding:28px;gap:14px;background:var(--paper)}
  .row{display:flex;align-items:center;gap:24px}
  .tile{background:#fff;border:1px solid var(--hairline);border-radius:4px;padding:20px;flex:1;display:flex;align-items:center;justify-content:center;height:100px}
  .tile img{max-height:70%;max-width:90%;object-fit:contain}
  .cap{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
  .eyebrow{font-family:var(--font-sans);font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:.14em;color:var(--ink)}
</style></head><body>
  <div class="eyebrow">PERÚ / ECUADOR / CHILE</div>
  <div class="row">
    <div style="flex:1"><div class="tile"><img src="../assets/asterisks-black.png"></div><div class="cap" style="margin-top:6px">Asterisks · Black</div></div>
    <div style="flex:1"><div class="tile"><img src="../assets/asterisks-red.png"></div><div class="cap" style="margin-top:6px">Asterisks · Red</div></div>
  </div>
  <div class="row">
    <div style="flex:1"><div class="tile"><img src="../assets/arrow-horizontal.png"></div><div class="cap" style="margin-top:6px">Arrow · Horizontal</div></div>
    <div style="flex:1"><div class="tile"><img src="../assets/arrow-diagonal-down.png" style="max-height:60%"></div><div class="cap" style="margin-top:6px">Arrow · Diagonal</div></div>
  </div>
  <div style="font-size:12px;color:var(--muted);line-height:1.5">Los únicos "íconos" del sistema. Triples <code>* * *</code> como firma / remate. Flechas finas de dibujo técnico.</div>
</body></html>
