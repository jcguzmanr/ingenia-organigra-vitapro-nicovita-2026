<!doctype html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body{padding:28px;gap:18px;background:var(--paper)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .tile{background:#fff;border:1px solid var(--hairline);border-radius:4px;height:120px;display:flex;align-items:center;justify-content:center;padding:16px}
  .tile img{max-height:70%;max-width:90%;object-fit:contain}
  .dark{background:#1a1a1a}
  .cap{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:6px}
  .cell{display:flex;flex-direction:column}
</style></head><body>
  <div class="grid">
    <div class="cell"><div class="tile"><img src="../assets/logo-full-gradient.png" alt="Logo gradient"></div><div class="cap">Full · Gradient</div></div>
    <div class="cell"><div class="tile"><img src="../assets/logo-full-black.png" alt="Logo black"></div><div class="cap">Full · Black</div></div>
    <div class="cell"><div class="tile dark"><img src="../assets/logo-stacked-gradient.png" alt="Stacked gradient"></div><div class="cap">Stacked · Gradient on Dark</div></div>
    <div class="cell"><div class="tile"><img src="../assets/logo-stacked-black.png" alt="Stacked black"></div><div class="cap">Stacked · Black</div></div>
  </div>
</body></html>
