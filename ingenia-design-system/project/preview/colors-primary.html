<!doctype html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body{padding:28px;gap:20px}
  .swatches{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .s{aspect-ratio:2/1;border-radius:4px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff}
  .s .n{font-size:12px;font-weight:600;letter-spacing:.02em}
  .s .h{font-family:ui-monospace,Menlo,monospace;font-size:10px;opacity:.85}
  .s.sm{aspect-ratio:3/1}
</style></head><body>
  <div class="swatches">
    <div class="s" style="background:#ff110a"><div class="n">Rojo Ingenia</div><div class="h">#ff110a</div></div>
    <div class="s" style="background:#ff5800"><div class="n">Naranja</div><div class="h">#ff5800</div></div>
    <div class="s" style="background:#ff9400"><div class="n">Naranja claro</div><div class="h">#ff9400</div></div>
  </div>
  <div style="font-size:12px;color:var(--muted);line-height:1.5">Un único color vivo en tres tonos. Rojo como dominante (una vez por vista). Naranja como soporte (core del isotipo). Ámbar como highlight / cierre de gradiente.</div>
</body></html>
