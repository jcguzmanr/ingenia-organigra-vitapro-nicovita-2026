<!doctype html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body{padding:28px;gap:16px;background:var(--paper)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .tile{background:#fff;border:1px solid var(--hairline);border-radius:4px;height:140px;display:flex;align-items:center;justify-content:center;padding:20px}
  .tile img{max-height:90%;max-width:90%;object-fit:contain}
  .cap{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:6px}
  .cell{display:flex;flex-direction:column}
</style></head><body>
  <div class="grid">
    <div class="cell"><div class="tile"><img src="../assets/logo-stacked-gradient.png" style="max-height:80%"></div><div class="cap">Gradient</div></div>
    <div class="cell"><div class="tile"><img src="../assets/isotipo-black.png" style="max-height:75%"></div><div class="cap">Black · Solid</div></div>
    <div class="cell"><div class="tile"><img src="../assets/isotipo-gray.png" style="max-height:75%"></div><div class="cap">Ghost · Watermark</div></div>
  </div>
  <div style="font-size:12px;color:var(--muted);line-height:1.5">Isotipo — dos círculos unidos por puente cóncavo. Gradiente direccional: masa roja a la izquierda, chico ámbar a la derecha. Nunca recortar ni invertir la dirección del gradiente.</div>
</body></html>
