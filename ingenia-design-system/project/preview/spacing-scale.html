<!doctype html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body{padding:28px;gap:10px}
  .row{display:flex;align-items:center;gap:14px;padding:6px 0;border-bottom:1px solid var(--hairline)}
  .row:last-child{border:none}
  .tag{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--muted);min-width:72px}
  .bar{background:var(--ingenia-red);height:10px;border-radius:2px}
  .px{font-size:11px;color:var(--muted);font-family:ui-monospace,Menlo,monospace;margin-left:auto}
</style></head><body>
  <div class="row"><span class="tag">sp-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="tag">sp-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="tag">sp-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="tag">sp-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="tag">sp-5</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="tag">sp-6</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="tag">sp-7</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row"><span class="tag">sp-8</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
  <div class="row"><span class="tag">sp-9</span><div class="bar" style="width:96px"></div><span class="px">96px</span></div>
</body></html>
