<!doctype html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body{padding:28px;gap:16px;background:var(--paper)}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:#fff;border:1px solid var(--hairline);border-radius:4px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img{height:28px;width:auto}
  .links{display:flex;gap:24px;font-family:var(--font-sans);font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:.12em}
  .links a{text-decoration:none;color:var(--ink)}
  .links a.active{color:var(--ingenia-red)}
  .cta{background:var(--ingenia-red);color:#fff;padding:8px 14px;border-radius:4px;font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;text-decoration:none}
  .footer{display:flex;align-items:center;justify-content:space-between;padding:14px 0;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;border-top:1px solid var(--hairline)}
  .ticker{flex:1;overflow:hidden;white-space:nowrap;opacity:.4}
</style></head><body>
  <div class="nav">
    <div class="brand"><img src="../assets/logo-full-black.png"></div>
    <div class="links">
      <a class="active">Inicio</a>
      <a>Método</a>
      <a>Casos</a>
      <a>Contacto</a>
    </div>
    <a class="cta">Hablemos →</a>
  </div>
  <div class="footer">
    <span>PERÚ / ECUADOR / CHILE</span>
    <span class="ticker">INGENIA / 2026 / INGENIA / 2026 / INGENIA / 2026</span>
    <span>© 2026</span>
  </div>
</body></html>
